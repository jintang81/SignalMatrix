<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0c0f18"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>
  <!-- Border accent -->
  <rect width="512" height="512" rx="88" fill="none" stroke="#2e3a50" stroke-width="8"/>
  <!-- "S" letter centered -->
  <text
    x="256"
    y="340"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="280"
    font-weight="700"
    fill="#c9a84c"
    letter-spacing="-8"
  >S</text>
  <!-- Subtle bottom line accent -->
  <rect x="180" y="400" width="152" height="3" rx="1.5" fill="#c9a84c" opacity="0.4"/>
</svg>
